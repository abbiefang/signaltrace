<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2f"/>
      <stop offset="100%" style="stop-color:#2a2a42"/>
    </linearGradient>
    <linearGradient id="path4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg4)"/>

  <!-- Flowing S-curve trace path -->
  <path d="M 120 140
           C 120 140, 380 110, 380 210
           C 380 280, 130 260, 130 330
           C 130 400, 390 370, 390 370"
        fill="none"
        stroke="url(#path4)"
        stroke-width="8"
        stroke-linecap="round"/>

  <!-- Trace dots along the path — like data points being tracked -->
  <circle cx="160" cy="155" r="11" fill="#667eea"/>
  <circle cx="160" cy="155" r="20" fill="#667eea" opacity="0.12"/>

  <circle cx="320" cy="192" r="11" fill="#9b6ee0"/>
  <circle cx="320" cy="192" r="20" fill="#9b6ee0" opacity="0.12"/>

  <circle cx="190" cy="300" r="11" fill="#e94560"/>
  <circle cx="190" cy="300" r="20" fill="#e94560" opacity="0.12"/>

  <circle cx="350" cy="355" r="14" fill="#f093fb"/>
  <circle cx="350" cy="355" r="24" fill="#f093fb" opacity="0.15"/>
</svg>