<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a30"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg2)"/>

  <!-- Concentric signal arcs (like radar/signal detection) -->
  <path d="M 310 205 A 80 80 0 0 1 310 315" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.15"/>
  <path d="M 340 180 A 115 115 0 0 1 340 340" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.1"/>
  <path d="M 370 155 A 150 150 0 0 1 370 365" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.06"/>

  <!-- Core dot — the "trace point" -->
  <circle cx="220" cy="260" r="18" fill="url(#accent2)"/>
  <circle cx="220" cy="260" r="30" fill="url(#accent2)" opacity="0.15"/>
  <circle cx="220" cy="260" r="44" fill="url(#accent2)" opacity="0.06"/>

  <!-- Subtle trace path leading to the dot -->
  <path d="M 100 260 L 140 260 L 155 240 L 170 280 L 185 250 L 202 260"
        fill="none"
        stroke="url(#accent2)"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.6"/>

  <!-- Text -->
  <text x="256" y="395" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="4" fill="#ffffff">signal</text>
  <text x="256" y="435" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="300" letter-spacing="10" fill="#ff6b6b">trace</text>
</svg>