<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalTrace UI Design</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #E2E2DE; font-family: -apple-system, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">const {useState}=React;const C={bg:"#F5F5F0",card:"#FFFFFF",accent:"#E8633A",accentSoft:"#FDF0EB",green:"#4CAF7D",greenSoft:"#EAF6EF",amber:"#F5A623",amberSoft:"#FEF6E4",red:"#E05C5C",redSoft:"#FDECEA",purple:"#8B7CF8",purpleSoft:"#F0EEFF",text:"#1A1A1A",textSub:"#6B6B6B",textMuted:"#ABABAB",border:"rgba(0,0,0,0.06)",shadow:"0 2px 20px rgba(0,0,0,0.06)",shadowLg:"0 8px 40px rgba(0,0,0,0.12)"};function Gauge({value=72,size=160,stroke=12,color=C.accent,label="Signal"}){const r=(size-stroke)/2,circ=2*Math.PI*r,dash=(value/100)*circ;return(<div style={{position:"relative",width:size,height:size,flexShrink:0}}><svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/></svg><div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:size*.24,fontWeight:800,color:"#fff",lineHeight:1}}>{value}</span><span style={{fontSize:size*.1,color:"rgba(255,255,255,0.6)",marginTop:3}}>{label}</span></div></div>);}function Bar({v=60,color=C.accent,bg="#eee",h=6}){return(<div style={{width:"100%",height:h,borderRadius:h,background:bg,overflow:"hidden"}}><div style={{width:`${v}%`,height:"100%",borderRadius:h,background:color}}/></div>);}function Tag({l,c=C.accent,b=C.accentSoft}){return(<span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,color:c,background:b,whiteSpace:"nowrap"}}>{l}</span>);}const people=[{id:1,name:"Alex",handle:"@alex_chen",score:82,trend:7,tag:"稳定",tc:C.green,tb:C.greenSoft,av:["#4CAF7D","#2E9D66"]},{id:2,name:"Jordan",handle:"@jordan.m",score:61,trend:-9,tag:"冷却中",tc:C.red,tb:C.redSoft,av:["#E8633A","#C44B24"]},{id:3,name:"Sam",handle:"@samantha_k",score:75,trend:3,tag:"面包屑",tc:C.amber,tb:C.amberSoft,av:["#F5A623","#E08D10"]},{id:4,name:"Morgan",handle:"@morgan_w",score:90,trend:12,tag:"热烈",tc:C.purple,tb:C.purpleSoft,av:["#8B7CF8","#6B5CD8"]}];function Card({p,onClick}){const[h,sh]=useState(false);return(<div onClick={onClick} onMouseEnter={()=>sh(true)} onMouseLeave={()=>sh(false)} style={{background:h?C.accentSoft:C.card,border:`1.5px solid ${h?"#F2A07A80":C.border}`,borderRadius:20,padding:"14px 16px",cursor:"pointer",transition:"all 0.2s",boxShadow:h?"0 4px 24px rgba(232,99,58,0.15)":C.shadow}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${p.av[0]},${p.av[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:"#fff",flexShrink:0}}>{p.name[0]}</div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><span style={{fontSize:14,fontWeight:700,color:C.text}}>{p.name}</span><Tag l={p.tag} c={p.tc} b={p.tb}/></div><span style={{fontSize:12,color:C.textMuted}}>{p.handle}</span></div><div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:22,fontWeight:800,color:C.text}}>{p.score}</div><div style={{fontSize:11,color:p.trend>0?C.green:C.red,fontWeight:600}}>{p.trend>0?"▲":"▼"} {Math.abs(p.trend)}</div></div></div><div style={{marginTop:12}}><Bar v={p.score} color={p.tc} bg={p.tb} h={7}/></div></div>);}function Detail({p,onBack}){const sigs=[{l:"响应速度",v:Math.min(p.score-5,99),c:C.accent},{l:"主动联系",v:Math.min(p.score+8,96),c:C.green},{l:"情感深度",v:Math.max(p.score-12,20),c:C.amber},{l:"稳定性",v:Math.min(p.score+3,98),c:C.purple}];return(<div style={{padding:"0 20px 40px",overflowY:"auto"}}><div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 0 20px"}}><button onClick={onBack} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,width:38,height:38,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button><span style={{fontSize:17,fontWeight:700,color:C.text}}>{p.name} 的信号详情</span></div><div style={{background:"linear-gradient(145deg,#1A1A1A,#2D2020)",borderRadius:28,padding:"28px 24px",boxShadow:C.shadowLg,marginBottom:16,display:"flex",flexDirection:"column",alignItems:"center"}}><Gauge value={p.score} size={170} stroke={14} color={p.tc} label="综合信号"/><div style={{marginTop:20,display:"flex",gap:10}}><Tag l={p.tag} c={p.tc} b={p.tc+"30"}/>< Tag l={p.trend>0?`+${p.trend} 上升中`:`${p.trend} 下降中`} c={p.trend>0?C.green:C.red} b={(p.trend>0?C.green:C.red)+"30"}/></div></div><div style={{background:C.card,borderRadius:24,padding:20,boxShadow:C.shadow}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:18}}>信号分解</div>{sigs.map(s=>(<div key={s.l} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}><span style={{fontSize:13,color:C.textSub}}>{s.l}</span><span style={{fontSize:13,fontWeight:700,color:s.c}}>{s.v}</span></div><Bar v={s.v} color={s.c} bg="#F0F0F0" h={8}/></div>))}</div></div>);}function App(){const[tab,setTab]=useState("home");const[sel,setSel]=useState(null);const avg=Math.round(people.reduce((a,b)=>a+b.score,0)/people.length);return(<div style={{display:"flex",justifyContent:"center",alignItems:"flex-start",minHeight:"100vh",background:"#E2E2DE",padding:"40px 20px"}}><div style={{width:390,minHeight:844,background:C.bg,borderRadius:52,boxShadow:"0 40px 100px rgba(0,0,0,0.28)",overflow:"hidden",display:"flex",flexDirection:"column"}}><div style={{padding:"16px 30px 0",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,fontWeight:600,color:C.text,flexShrink:0}}><span>9:41</span><div style={{width:120,height:34,background:"#000",borderRadius:20}}/><span>100%</span></div><div style={{flex:1,overflowY:"auto",paddingBottom:88}}>{sel?(<Detail p={sel} onBack={()=>setSel(null)}/>):tab==="home"?(<div style={{padding:"8px 20px"}}><div style={{padding:"18px 0 22px"}}><div style={{fontSize:13,color:C.textMuted,marginBottom:5}}>Good Evening</div><div style={{fontSize:28,fontWeight:800,color:C.text}}>你好，Ab 👋</div></div><div style={{background:"linear-gradient(145deg,#141414,#2A2020)",borderRadius:28,padding:"26px 24px",boxShadow:C.shadowLg,marginBottom:18,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginBottom:10}}>整体信号健康度</div><div style={{fontSize:48,fontWeight:900,color:"#fff",lineHeight:1}}>{avg}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginTop:8}}>4段关系追踪中</div><div style={{marginTop:16}}><span style={{display:"inline-block",padding:"5px 14px",borderRadius:20,fontSize:11,fontWeight:600,color:C.green,background:"rgba(76,175,125,0.2)"}}>↑ 本周整体上升 +5</span></div></div><Gauge value={avg} size={128} stroke={11} color={C.accent} label="综合"/></div><div style={{background:C.card,borderRadius:24,padding:"20px 16px",boxShadow:C.shadow,marginBottom:18}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:18}}>快捷操作</div><div style={{display:"flex",justifyContent:"space-around"}}>{[["➕","记录互动",C.accentSoft],["📊","分析报告",C.greenSoft],["🔔","信号预警",C.amberSoft],["👤","添加联系人",C.purpleSoft]].map(([ic,lb,bg])=>(<div key={lb} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:7,cursor:"pointer"}}><div style={{width:54,height:54,borderRadius:17,background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{ic}</div><span style={{fontSize:11,color:C.textSub}}>{lb}</span></div>))}</div></div><div style={{background:"linear-gradient(135deg,#FDF2EE,#FDE8DF)",border:"1px solid #F2A07A50",borderRadius:20,padding:"16px 18px",marginBottom:18,display:"flex",alignItems:"flex-start",gap:12}}><div style={{width:38,height:38,borderRadius:13,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>⚠️</div><div><div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:5}}>Jordan 信号预警</div><div style={{fontSize:12,color:C.textSub,lineHeight:1.6}}>连续9分下滑，检测到面包屑模式。过去2周响应率仅40%。</div></div></div><div style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><span style={{fontSize:14,fontWeight:700,color:C.text}}>正在追踪</span><span style={{fontSize:12,color:C.accent,fontWeight:600}}>查看全部</span></div><div style={{display:"flex",flexDirection:"column",gap:10}}>{people.map(p=>(<Card key={p.id} p={p} onClick={()=>setSel(p)}/>))}</div></div></div>):tab==="analyze"?(<div style={{padding:"20px"}}><div style={{fontSize:24,fontWeight:800,color:C.text,marginBottom:22}}>信号分析</div>{[{ic:"🍞",t:"面包屑模式",d:"Jordan表现出典型热-冷循环，回复间隔从2h→24h",c:C.red,bg:C.redSoft},{ic:"📈",t:"Morgan关系加速",d:"过去7天互动频率+340%，主动率75%，信号极健康",c:C.green,bg:C.greenSoft},{ic:"⚖️",t:"Sam投入不对等",d:"单向努力模式：你的主动率68% vs 对方32%",c:C.amber,bg:C.amberSoft}].map((item,i)=>(<div key={i} style={{background:C.card,borderRadius:22,padding:20,boxShadow:C.shadow,marginBottom:12,borderLeft:`4px solid ${item.c}`}}><div style={{display:"flex",gap:14}}><div style={{width:44,height:44,borderRadius:14,background:item.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{item.ic}</div><div><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:6}}>{item.t}</div><div style={{fontSize:12,color:C.textSub,lineHeight:1.7}}>{item.d}</div></div></div></div>))}</div>):(<div style={{padding:"20px"}}><div style={{fontSize:24,fontWeight:800,color:C.text,marginBottom:22}}>设置</div>{[["🔔","信号预警通知","已开启"],["📊","数据分析精度","高精度"],["🔒","隐私保护模式","开启"],["🌐","语言","中文"],["☁️","云同步","5分钟前"]].map(([ic,lb,sub])=>(<div key={lb} style={{background:C.card,borderRadius:18,padding:"16px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,boxShadow:C.shadow,cursor:"pointer"}}><div style={{display:"flex",alignItems:"center",gap:14}}><span style={{fontSize:20}}>{ic}</span><div><div style={{fontSize:14,fontWeight:500,color:C.text}}>{lb}</div><div style={{fontSize:11,color:C.textMuted,marginTop:1}}>{sub}</div></div></div><span style={{color:C.textMuted,fontSize:18}}>›</span></div>))}</div>)}</div><div style={{position:"sticky",bottom:0,background:"rgba(245,245,240,0.94)",backdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`,padding:"10px 0 28px",display:"flex",justifyContent:"space-around",zIndex:100}}>{[["home","🏠","首页"],["analyze","📡","分析"],["settings","⚙️","设置"]].map(([id,ic,lb])=>(<button key={id} onClick={()=>{setTab(id);setSel(null);}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"6px 24px"}}><span style={{fontSize:24}}>{ic}</span><span style={{fontSize:10,fontWeight:600,color:tab===id?C.accent:C.textMuted}}>{lb}</span>{tab===id&&<div style={{width:4,height:4,borderRadius:"50%",background:C.accent}}/>}</button>))}</div></div><div style={{marginLeft:36,paddingTop:60,maxWidth:200}}><div style={{fontSize:24,fontWeight:900,color:"#1A1A1A",marginBottom:6}}>SignalTrace</div><div style={{fontSize:13,color:"#6B6B6B",marginBottom:28,lineHeight:1.6}}>UI Design Concept<br/>高级感移动端设计稿</div>{[[C.accent,"Signal Fire 暖橙"],[C.green,"健康信号 绿"],[C.red,"预警/冷却 红"],[C.amber,"面包屑 琥珀"],[C.purple,"热烈 紫"]].map(([dot,lb])=>(<div key={lb} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:10,height:10,borderRadius:"50%",background:dot,flexShrink:0}}/><span style={{fontSize:12,color:"#6B6B6B"}}>{lb}</span></div>))}</div></div>);} ReactDOM.render(<App/>,document.getElementById("root"));</script>
</body>
</html>
