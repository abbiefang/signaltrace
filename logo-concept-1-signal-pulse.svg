<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="signal1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="50%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg1)"/>

  <!-- Signal trace line - a pulse that peaks into a subtle heart shape -->
  <path d="M 80 280
           L 150 280
           L 175 280
           L 200 220
           L 225 180
           L 242 140
           L 256 170
           L 270 140
           L 287 180
           L 312 220
           L 337 280
           L 362 280
           L 432 280"
        fill="none"
        stroke="url(#signal1)"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Glow effect on the pulse -->
  <path d="M 80 280
           L 150 280
           L 175 280
           L 200 220
           L 225 180
           L 242 140
           L 256 170
           L 270 140
           L 287 180
           L 312 220
           L 337 280
           L 362 280
           L 432 280"
        fill="none"
        stroke="url(#signal1)"
        stroke-width="16"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.2"/>

  <!-- Small dot trace indicator -->
  <circle cx="432" cy="280" r="8" fill="#e94560"/>
  <circle cx="432" cy="280" r="14" fill="#e94560" opacity="0.3"/>

  <!-- Text: Signal Trace -->
  <text x="256" y="370" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="600" letter-spacing="6" fill="#ffffff">SIGNAL</text>
  <text x="256" y="420" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="36" font-weight="300" letter-spacing="12" fill="#e94560">TRACE</text>
</svg>