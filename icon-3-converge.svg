<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7f7fc"/>
      <stop offset="100%" style="stop-color:#eeeef6"/>
    </linearGradient>
    <linearGradient id="main3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c44569"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg3)"/>

  <!-- Chaos zone: multiple faint overlapping paths -->
  <path d="M 65 230 C 90 200, 120 270, 155 235" fill="none" stroke="#e94560" stroke-width="4.5" opacity="0.12" stroke-linecap="round"/>
  <path d="M 65 250 C 95 220, 125 280, 160 248" fill="none" stroke="#e94560" stroke-width="4.5" opacity="0.12" stroke-linecap="round"/>
  <path d="M 65 270 C 88 245, 118 290, 158 262" fill="none" stroke="#e94560" stroke-width="4.5" opacity="0.12" stroke-linecap="round"/>
  <path d="M 65 290 C 92 265, 122 300, 155 275" fill="none" stroke="#e94560" stroke-width="4.5" opacity="0.12" stroke-linecap="round"/>

  <!-- Convergence -->
  <path d="M 155 252 C 175 252, 195 256, 215 256" fill="none" stroke="#e94560" stroke-width="4" opacity="0.3" stroke-linecap="round"/>

  <!-- Clear resolved signal -->
  <path d="M 215 256 L 270 256 L 295 200 L 325 310 L 355 220 L 380 256 L 450 256"
        fill="none"
        stroke="url(#main3)"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- End point -->
  <circle cx="450" cy="256" r="10" fill="#e94560"/>
  <circle cx="450" cy="256" r="17" fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.3"/>
</svg>