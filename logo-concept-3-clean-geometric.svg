<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8fc"/>
      <stop offset="100%" style="stop-color:#eeeef5"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="warm3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
  </defs>

  <!-- Light background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg3)"/>

  <!-- Abstract S shape made of two connected arcs — represents Signal -->
  <path d="M 170 170
           C 170 170, 256 140, 300 200
           C 344 260, 220 270, 220 270
           C 220 270, 160 280, 210 340
           C 260 400, 345 370, 345 370"
        fill="none"
        stroke="url(#warm3)"
        stroke-width="10"
        stroke-linecap="round"/>

  <!-- Three trace dots along the path -->
  <circle cx="190" cy="182" r="8" fill="#6c5ce7"/>
  <circle cx="260" cy="270" r="8" fill="#9b59b6"/>
  <circle cx="325" cy="358" r="8" fill="#e94560"/>

  <!-- Tiny connecting dashes suggesting trace/tracking -->
  <line x1="198" y1="186" x2="250" y2="260" stroke="#6c5ce7" stroke-width="2" stroke-dasharray="4,6" opacity="0.3"/>
  <line x1="268" y1="274" x2="317" y2="350" stroke="#9b59b6" stroke-width="2" stroke-dasharray="4,6" opacity="0.3"/>

  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="40" font-weight="600" letter-spacing="3" fill="#2d2d3f">signal trace</text>
</svg>