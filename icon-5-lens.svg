<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141420"/>
      <stop offset="100%" style="stop-color:#1c1c32"/>
    </linearGradient>
    <linearGradient id="ring5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg5)"/>

  <!-- Outer lens circle -->
  <circle cx="240" cy="240" r="130" fill="none" stroke="url(#ring5)" stroke-width="7" opacity="0.8"/>

  <!-- Inner signal pulse running through the lens center -->
  <path d="M 110 240 L 170 240 L 195 200 L 220 280 L 245 190 L 270 240 L 310 240 L 370 240"
        fill="none"
        stroke="#ffffff"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.9"/>

  <!-- Glow on pulse -->
  <path d="M 110 240 L 170 240 L 195 200 L 220 280 L 245 190 L 270 240 L 310 240 L 370 240"
        fill="none"
        stroke="#e94560"
        stroke-width="14"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.1"/>

  <!-- Lens handle / trace tail going to bottom right -->
  <line x1="332" y1="332" x2="420" y2="420" stroke="url(#ring5)" stroke-width="7" stroke-linecap="round" opacity="0.8"/>

  <!-- Small focus dot at the peak -->
  <circle cx="245" cy="190" r="6" fill="#ffffff" opacity="0.8"/>
</svg>