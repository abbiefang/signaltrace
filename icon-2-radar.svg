<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a30"/>
    </linearGradient>
    <linearGradient id="dot2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg2)"/>

  <!-- Signal arcs radiating from core -->
  <path d="M 305 196 A 85 85 0 0 1 305 324" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.22"/>
  <path d="M 345 160 A 130 130 0 0 1 345 360" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.13"/>
  <path d="M 385 125 A 175 175 0 0 1 385 395" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.07"/>

  <!-- Core signal dot -->
  <circle cx="210" cy="260" r="28" fill="url(#dot2)"/>
  <circle cx="210" cy="260" r="46" fill="url(#dot2)" opacity="0.12"/>
  <circle cx="210" cy="260" r="66" fill="url(#dot2)" opacity="0.05"/>

  <!-- Trace line feeding into the dot -->
  <path d="M 80 260 L 110 260 L 125 238 L 142 282 L 158 248 L 182 260"
        fill="none"
        stroke="url(#dot2)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.5"/>
</svg>