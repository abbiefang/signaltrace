<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2f"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
    <linearGradient id="line4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="40%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg4)"/>

  <!-- Stylized "ST" monogram built from signal trace lines -->

  <!-- S - made of a signal wave -->
  <path d="M 130 165
           C 130 165, 250 130, 265 180
           C 280 230, 140 240, 140 260
           C 140 280, 280 290, 265 340
           C 250 390, 130 355, 130 355"
        fill="none"
        stroke="url(#line4)"
        stroke-width="8"
        stroke-linecap="round"/>

  <!-- T - clean vertical with a pulse on the crossbar -->
  <line x1="310" y1="165" x2="310" y2="355" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- T crossbar as a mini signal pulse -->
  <path d="M 290 165 L 300 165 L 305 150 L 310 175 L 315 150 L 320 165 L 400 165"
        fill="none"
        stroke="url(#line4)"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Subtle glow dot at the end of S -->
  <circle cx="145" cy="352" r="6" fill="#f093fb"/>
  <circle cx="145" cy="352" r="12" fill="#f093fb" opacity="0.2"/>

  <!-- Text below -->
  <text x="256" y="435" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="400" letter-spacing="8" fill="#ffffff" opacity="0.7">SIGNAL TRACE</text>
</svg>