<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="50%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg1)"/>

  <!-- Signal pulse line with heart-shaped double peak -->
  <path d="M 60 270
           L 120 270
           L 155 270
           L 185 210
           L 215 155
           L 240 105
           L 256 145
           L 272 105
           L 297 155
           L 327 210
           L 357 270
           L 392 270
           L 452 270"
        fill="none"
        stroke="url(#line1)"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Glow -->
  <path d="M 60 270
           L 120 270
           L 155 270
           L 185 210
           L 215 155
           L 240 105
           L 256 145
           L 272 105
           L 297 155
           L 327 210
           L 357 270
           L 392 270
           L 452 270"
        fill="none"
        stroke="url(#line1)"
        stroke-width="24"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.15"/>

  <!-- End dot -->
  <circle cx="452" cy="270" r="10" fill="#e94560"/>
  <circle cx="452" cy="270" r="18" fill="#e94560" opacity="0.25"/>

  <!-- Faint baseline -->
  <line x1="60" y1="380" x2="452" y2="380" stroke="#ffffff" stroke-width="1.5" opacity="0.08"/>
</svg>