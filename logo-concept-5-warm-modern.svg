<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f5"/>
      <stop offset="100%" style="stop-color:#fff0f0"/>
    </linearGradient>
    <linearGradient id="trace5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c44569"/>
    </linearGradient>
  </defs>

  <!-- Soft light background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg5)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#f0d0d0" stroke-width="1"/>

  <!-- Main icon: a clean trace line that resolves into clarity -->
  <!-- Messy/uncertain start on left, clean resolution on right -->

  <!-- Uncertain zone - multiple overlapping faint lines -->
  <path d="M 90 256 C 110 230, 130 280, 150 250" fill="none" stroke="#e94560" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <path d="M 90 260 C 115 240, 135 275, 155 255" fill="none" stroke="#e94560" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <path d="M 90 252 C 108 235, 128 270, 148 248" fill="none" stroke="#e94560" stroke-width="3" opacity="0.15" stroke-linecap="round"/>

  <!-- Convergence zone -->
  <path d="M 150 252 C 170 252, 185 256, 200 256" fill="none" stroke="#e94560" stroke-width="3" opacity="0.3" stroke-linecap="round"/>

  <!-- Clear resolved line -->
  <path d="M 200 256 L 260 256 L 280 220 L 300 290 L 320 240 L 340 256 L 420 256"
        fill="none"
        stroke="url(#trace5)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Decision point marker -->
  <circle cx="300" cy="256" r="0" fill="none"/>

  <!-- End point: clear signal achieved -->
  <circle cx="420" cy="256" r="7" fill="#e94560"/>
  <circle cx="420" cy="256" r="12" fill="none" stroke="#e94560" stroke-width="2" opacity="0.3"/>

  <!-- Small check mark near the end point -->
  <path d="M 414 256 L 419 261 L 428 250" fill="none" stroke="#ffffff" stroke-width="0" opacity="0"/>

  <!-- Text -->
  <text x="256" y="370" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="600" letter-spacing="2" fill="#2d2d3f">Signal Trace</text>

  <!-- Tagline -->
  <text x="256" y="405" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="3" fill="#999" opacity="0.7">SEE CLEARLY. DECIDE WELL.</text>
</svg>